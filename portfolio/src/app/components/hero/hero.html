<section id="hero"
  class="pt-24 pb-[80px] md:pt-[200px] md:pb-[120px]
         flex flex-col items-center text-center
         md:flex-row md:items-center md:text-left
         gap-8 md:gap-6">

  <!-- Mobile portrait photo -->
  <div class="md:hidden w-48 h-64 rounded-2xl overflow-hidden
              shadow-[0_10px_40px_rgba(229,160,141,0.2)] relative"
       appScrollReveal>
    <img src="assets/images/myPic.jpg" alt="Z1JAY Portrait"
         class="w-full h-full object-cover object-top" />
    <div class="absolute inset-0 ring-1 ring-inset ring-white/20 rounded-2xl pointer-events-none"></div>
  </div>

  <!-- Text block -->
  <div class="w-full md:w-5/12 space-y-4 md:space-y-6" appScrollReveal revealClass="reveal-left">
    <h1 class="text-[32px] md:text-[40px] lg:text-[64px]
               leading-[1.1] tracking-[-0.02em] text-on-surface">
      Hello,<br/>I am Z. Jay
    </h1>
    <p class="text-[16px] md:text-[18px] leading-[1.6] text-on-surface-variant max-w-sm mx-auto md:mx-0 md:max-w-md">
      嶺東科技大學數位媒體設計系碩士。在設計與技術之間尋找平衡，
      來自 3D 設計背景，習於用建模、動畫與材質，將抽象概念具象化。
    </p>
    <div class="flex justify-center md:justify-start pt-1">
      <a href="#contact"
         class="gradient-btn inline-flex items-center gap-2
                px-8 py-4 rounded-full text-[12px] tracking-widest uppercase
                text-on-tertiary-container font-medium
                hover:opacity-90 hover:scale-[1.02] transition-all duration-300">
        聯繫我
        <span class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>
      </a>
    </div>
  </div>

  <!-- Desktop photo (hidden on mobile) -->
  <div class="hidden md:block w-full md:w-7/12" appScrollReveal revealClass="reveal-right" [revealDelay]="200"
       [style.transform]="'translateY(' + parallaxY() + 'px)'">
    <div class="aspect-[4/5] md:aspect-square w-full rounded-lg bg-surface-container overflow-hidden glass-panel border-none p-2 premium-hover">
      <img src="assets/images/myPic.jpg" alt="Z1JAY Portrait"
           class="w-full h-full object-cover object-top rounded-md" />
    </div>
  </div>
</section>
