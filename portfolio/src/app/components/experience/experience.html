<section id="experience" class="section-py max-w-3xl mx-auto">
  <h2 class="section-heading text-center md:text-left" appScrollReveal>過去經歷</h2>

  <div class="glass-panel rounded-lg p-8 md:p-12 relative overflow-hidden premium-hover" appScrollReveal>
    <div class="border-l border-secondary-container/50 pl-8 space-y-16 ml-4 md:ml-0 relative z-10">

      @for (entry of experiences; track entry.year; let i = $index) {
        <div class="relative" appScrollReveal revealClass="reveal-left" [revealDelay]="(i + 1) * 100">

          <!-- Timeline dot -->
          <div class="absolute -left-[37px] top-1.5 w-3 h-3 rounded-sm ring-4 ring-surface"
               [class.bg-primary]="entry.highlight"
               [class.bg-surface-variant]="!entry.highlight"
               [style.boxShadow]="entry.highlight ? '0 0 10px rgba(212,175,55,0.5)' : 'none'">
          </div>

          <div class="flex flex-col gap-1">
            <span class="text-[12px] tracking-widest uppercase"
                  [class.text-primary]="entry.highlight"
                  [class.text-secondary]="!entry.highlight">{{ entry.year }}</span>
            <h3 class="text-[28px] leading-[1.3] text-on-surface mt-2">
              {{ entry.title }}
              <span class="text-secondary font-normal">&#64; {{ entry.org }}</span>
            </h3>
            <p class="text-[16px] leading-[1.6] text-on-surface-variant mt-2 max-w-2xl">
              {{ entry.description }}
            </p>
          </div>

        </div>
      }

    </div>
  </div>
</section>
