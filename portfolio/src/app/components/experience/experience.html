<section id="experience" class="section-py">
  <div class="max-w-[1440px] mx-auto px-5 md:px-12">

  <div class="flex items-end gap-4 mb-10 md:mb-14" appScrollReveal>
    <span class="brut-label text-punch">04 /</span>
    <h2 class="section-heading !mb-0">過去經歷</h2>
  </div>

  <div class="flex flex-col gap-8 max-w-4xl">
    @for (entry of experiences; track entry.year; let i = $index) {
      <div class="brut-card brut-hover grid md:grid-cols-12 gap-4 md:gap-8 p-6 md:p-8 relative"
           [class.md:-rotate-[0.4deg]]="i % 2 === 0"
           [class.md:rotate-[0.4deg]]="i % 2 === 1"
           appScrollReveal [revealClass]="i % 2 === 0 ? 'reveal-left' : 'reveal-right'">

        @if (entry.highlight) {
          <span class="sticker bg-punch text-white absolute -top-4 right-6 rotate-2 !text-[10px]">Highlight</span>
        }

        <!-- Giant year -->
        <div class="md:col-span-3 flex md:justify-center items-start">
          <span class="font-display text-[40px] md:text-[56px] leading-none"
                [class.text-punch]="entry.highlight"
                [class.text-stroke]="!entry.highlight">{{ entry.year }}</span>
        </div>

        <div class="md:col-span-9">
          <h3 class="font-display text-[20px] md:text-[24px] leading-[1.3]">
            {{ entry.title }}
          </h3>
          <p class="brut-label text-on-surface-variant mt-1.5 normal-case">&#64; {{ entry.org }}</p>
          <p class="text-[15px] leading-[1.8] text-on-surface-variant mt-3">
            {{ entry.description }}
          </p>
        </div>
      </div>
    }
  </div>

  </div>
</section>
