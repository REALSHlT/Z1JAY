<section id="contact" class="py-[120px] flex flex-col items-center justify-center text-center min-h-[614px]">
  <h2 class="text-[40px] md:text-[64px] leading-[1.1] tracking-[-0.02em] text-on-surface mb-6 max-w-4xl"
      appScrollReveal>
    準備好打造下一個<br/>
    <span class="text-primary italic inline-block hover:scale-105 transition-transform duration-500 cursor-default"
          style="text-shadow:0 0 40px rgba(212,175,55,0.3);">非凡的專案了嗎？</span>
  </h2>

  <p class="text-[18px] leading-[1.6] text-on-surface-variant max-w-lg"
     appScrollReveal [revealDelay]="100">
    台中市, 台灣 · 歡迎隨時聯繫，共同打造高品質的視覺體驗。
  </p>

  <div class="flex flex-col sm:flex-row gap-6 mt-12" appScrollReveal [revealDelay]="200">
    <a [href]="links.social.email"
       class="btn-primary">
      <span class="material-symbols-outlined text-sm">mail</span> Email
    </a>
    <a [href]="links.social.phone"
       class="btn-primary">
      <span class="material-symbols-outlined text-sm">call</span> +886 984 527 128
    </a>
    <a [href]="links.social.instagram" target="_blank" rel="noopener"
       class="btn-outline">
      <span class="material-symbols-outlined text-sm">alternate_email</span> Instagram
    </a>
  </div>
</section>
