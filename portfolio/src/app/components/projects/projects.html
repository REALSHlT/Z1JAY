<section id="work" class="py-[120px]">
  <h2 class="text-[48px] leading-[1.2] text-on-surface mb-12" appScrollReveal>專案作品</h2>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    @for (project of projects; track project.title; let i = $index) {
      <a [href]="project.link" target="_blank" rel="noopener"
         class="group relative aspect-[4/3] rounded-lg overflow-hidden glass-panel block cursor-pointer p-2 premium-hover"
         [ngClass]="project.offsetClass"
         appScrollReveal
         [revealClass]="project.revealClass"
         [revealDelay]="i % 2 === 1 ? 100 : 0">
        <div class="w-full h-full rounded-md overflow-hidden relative">
          <img [src]="project.image" [alt]="project.title"
               class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
          <div class="absolute inset-0 bg-surface/60 opacity-0 group-hover:opacity-100 transition-all duration-500
                      flex flex-col items-center justify-center backdrop-blur-sm gap-3">
            <div class="w-16 h-16 rounded-full bg-primary text-on-primary flex items-center justify-center
                        transform translate-y-8 group-hover:translate-y-0 transition-all duration-500
                        shadow-[0_0_30px_rgba(212,175,55,0.5)]">
              <span class="material-symbols-outlined">visibility</span>
            </div>
            <div class="transform translate-y-8 group-hover:translate-y-0 transition-all duration-500 delay-75 text-center px-4">
              <p class="text-[28px] leading-[1.3] text-on-surface">{{ project.title }}</p>
              <p class="text-[16px] leading-[1.6] text-on-surface-variant mt-1">{{ project.subtitle }}</p>
            </div>
          </div>
        </div>
      </a>
    }
  </div>
</section>
