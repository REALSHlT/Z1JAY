<section id="work" class="section-py">
  <div class="max-w-[1440px] mx-auto px-5 md:px-12">

  <div class="flex items-end gap-4 mb-10 md:mb-14" appScrollReveal>
    <span class="brut-label text-punch">02 /</span>
    <h2 class="section-heading !mb-0">專案作品</h2>
    <span class="brut-label text-on-surface-variant hidden md:block mb-2 ml-auto">Selected works 2022 — 2024</span>
  </div>

  <div class="flex flex-col gap-12 md:gap-16">
    @for (project of projects; track project.title; let i = $index) {
      <a [href]="project.link" target="_blank" rel="noopener"
         class="group grid md:grid-cols-12 gap-6 md:gap-10 items-center cursor-pointer"
         appScrollReveal
         [revealClass]="i % 2 === 0 ? 'reveal-left' : 'reveal-right'">

        <!-- Index number -->
        <div class="hidden md:flex md:col-span-2 items-start justify-center">
          <span class="font-display text-[80px] leading-none text-stroke group-hover:text-punch group-hover:[-webkit-text-stroke:0px] transition-all">
            {{ '0' + (i + 1) }}
          </span>
        </div>

        <!-- Image frame -->
        <div class="md:col-span-6 glitch-hover"
             [class.md:order-last]="i % 2 === 1">
          <div class="bg-white border-[3px] border-ink shadow-brut p-3 transition-transform duration-300
                      group-hover:-translate-x-1 group-hover:-translate-y-1 group-hover:shadow-brut-lg"
               [class.rotate-1]="i % 2 === 0"
               [class.-rotate-1]="i % 2 === 1">
            <div class="aspect-[16/9] overflow-hidden border-2 border-ink relative">
              <img [src]="project.image" [alt]="project.title"
                   class="w-full h-full object-cover" />
              <span class="absolute top-3 right-3 sticker bg-acid !py-1.5 !px-3 opacity-0 group-hover:opacity-100 transition-opacity rotate-2">
                Watch
                <span class="material-symbols-outlined" style="font-size:14px;">north_east</span>
              </span>
            </div>
          </div>
        </div>

        <!-- Info -->
        <div class="md:col-span-4">
          <span class="md:hidden font-mono font-bold text-[12px] text-punch">0{{ i + 1 }} /</span>
          <h3 class="font-display text-[28px] md:text-[36px] leading-[1.15] mt-1 mb-3
                     underline decoration-transparent decoration-[3px] underline-offset-8
                     group-hover:decoration-acid transition-colors">
            {{ project.title }}
          </h3>
          <div class="flex flex-wrap gap-2">
            @for (tag of project.subtitle.split(' · '); track tag) {
              <span class="brut-tag">{{ tag }}</span>
            }
          </div>
        </div>
      </a>
    }
  </div>

  </div>
</section>
