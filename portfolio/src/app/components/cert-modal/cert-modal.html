@if (modal.state().open) {
  <div id="certModalBackdrop"
       class="fixed inset-0 z-[9999] bg-black/90 flex items-center justify-center"
       (click)="onBackdropClick($event)">
    <button (click)="modal.close()"
            class="absolute top-5 right-9 text-white text-5xl font-bold leading-none cursor-pointer
                   hover:text-[#d4af37] transition-colors z-[10000]">&times;</button>
    <img [src]="modal.state().src" [alt]="modal.state().alt"
         class="max-w-[90%] max-h-[90vh] object-contain rounded-lg" />
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 text-white text-center px-6 py-3
                bg-black/65 rounded-lg text-base whitespace-nowrap">
      {{ modal.state().alt }}
    </div>
  </div>
}
