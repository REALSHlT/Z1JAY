<section id="certifications" class="section-py sec-punch-tint relative overflow-hidden">
  <!-- Comic decorations -->
  <div class="hidden md:block absolute -top-6 left-1/3 w-52 h-36 halftone opacity-25 rotate-2 pointer-events-none"></div>

  <div class="max-w-[1440px] mx-auto px-5 md:px-12 relative">

  <div class="flex items-end gap-4 mb-10 md:mb-14" appScrollReveal>
    <span class="brut-label text-punch">06 /</span>
    <h2 class="section-heading !mb-0">專業證照</h2>
    <span class="burst burst-acid w-28 h-28 rotate-12 hidden lg:inline-flex ml-auto -mb-4 !text-[11px]">Certified!</span>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-10 md:gap-8">
    @for (cert of certs; track cert.number; let i = $index) {
      <div class="bg-white border-[3px] border-ink shadow-brut brut-hover p-3 pb-6 relative"
           [class.md:-rotate-1]="i % 3 === 0"
           [class.md:rotate-1]="i % 3 === 1"
           [class.md:-rotate-[0.5deg]]="i % 3 === 2"
           appScrollReveal [revealDelay]="(i + 1) * 100" revealClass="reveal-scale">

        <!-- Tape -->
        <span class="absolute -top-3 left-1/2 -translate-x-1/2 w-20 h-6 bg-acid/90 border-2 border-ink -rotate-1 z-10"></span>

        <div class="cert-img-wrap h-[230px] border-2 border-ink" (click)="openModal(cert)">
          <img [src]="cert.image" [alt]="cert.alt"
               class="w-full h-full object-cover" />
        </div>
        <div class="px-3 pt-5">
          <h4 class="font-display text-[18px] leading-[1.3] mb-1">{{ cert.title }}</h4>
          <p class="brut-label text-punch">{{ cert.subtitle }}</p>
          <p class="text-[14px] leading-[1.7] text-on-surface-variant mt-2">{{ cert.detail }}</p>
          <p class="font-mono text-[11px] text-on-surface-variant/70 mt-2 tracking-widest uppercase">{{ cert.number }}</p>
        </div>
      </div>
    }
  </div>

  </div>
</section>
